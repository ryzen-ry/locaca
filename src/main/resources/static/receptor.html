<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐭 El Ratón - Location Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #8D6E63 0%, #5D4037 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #8D6E63; text-align: center; margin-bottom: 30px; }
        h1 small { font-size: 14px; color: #666; display: block; }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
        }
        label { font-weight: bold; display: block; margin-bottom: 10px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-family: monospace;
            text-transform: uppercase;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
            font-weight: bold;
        }
        button:hover { transform: translateY(-2px); }
        .btn-connect { background: #4CAF50; color: white; }
        .btn-disconnect { background: #f44336; color: white; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
        }
        .status-connected { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-disconnected { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .location-box {
            background: #e7f3ff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }
        .emoji-big { font-size: 48px; margin: 10px 0; }
        .coord-text {
            font-family: monospace;
            font-size: 16px;
            margin: 10px 0;
        }
        .last-update { font-size: 12px; color: #666; margin-top: 10px; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #8D6E63;
            text-decoration: none;
        }
        #map {
            height: 300px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
        .info-multi {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            color: #1565C0;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🐭 El Ratón <small>Sigue al queso en tiempo real</small></h1>
        
        <div class="info-card">
            <label>🧀 Código del Queso:</label>
            <input type="text" id="quesoId" placeholder="Ej: Q-ABC123" />
            <div class="help-text">Ingresa el código que te compartió el queso 🧀</div>
        </div>
        
        <div class="info-multi">
            🐭🐭🐭 <strong>Múltiples ratones</strong> - Varios ratones pueden seguir al mismo queso
        </div>
        
        <button class="btn-connect" onclick="connectAsRaton()" id="connectBtn">🔌 Seguir al queso</button>
        <button class="btn-disconnect" onclick="disconnect()" id="disconnectBtn" disabled>❌ Dejar de seguir</button>
        
        <div id="status" class="status status-disconnected">⚪ Sin seguir al queso</div>
        
        <div id="map"></div>
        
        <div class="location-box">
            <div class="emoji-big">🧀 ➡️ 🐭</div>
            <div class="coord-text" id="coordinates">Esperando ubicación del queso...</div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
        
        <div style="text-align: center;">
            <a href="/" class="back-btn">← Volver al inicio</a>
        </div>
    </div>
    
    <script>
        let stompClient = null;
        let isConnected = false;
        let currentQuesoId = null;
        let map = null;
        let marker = null;
        let subscription = null;
        
        function initMap() {
            map = L.map('map').setView([0, 0], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
        }
        
        function connectWebSocket() {
            return new Promise((resolve, reject) => {
                const socket = new SockJS(`${window.location.origin}/ws-location`);
                stompClient = Stomp.over(socket);
                
                stompClient.connect({}, () => {
                    console.log('✅ Ratón conectado al servidor');
                    resolve();
                }, (error) => {
                    console.error('Error de conexión:', error);
                    reject(error);
                });
            });
        }
        
        function subscribeToQueso(quesoId) {
            if (subscription) {
                subscription.unsubscribe();
                subscription = null;
            }
            
            subscription = stompClient.subscribe(`/topic/location/${quesoId}`, (message) => {
                const location = JSON.parse(message.body);
                console.log('🧀 Ubicación del queso recibida:', location);
                updateLocationDisplay(location);
            });
            
            console.log(`✅ Ratón siguiendo al queso ${quesoId}`);
        }
        
        function updateLocationDisplay(location) {
            const lat = location.latitude;
            const lng = location.longitude;
            
            document.getElementById('coordinates').innerHTML = `
                🧀 ¡El queso está aquí! (${location.emisorId})<br>
                📍 Latitud: ${lat.toFixed(6)}<br>
                📍 Longitud: ${lng.toFixed(6)}
            `;
            document.getElementById('lastUpdate').innerHTML = `Última actualización: ${new Date(location.timestamp).toLocaleTimeString()}`;
            
            if (map && lat && lng) {
                if (marker) {
                    marker.setLatLng([lat, lng]);
                } else {
                    marker = L.marker([lat, lng]).addTo(map);
                    marker.bindTooltip('🧀 Queso').openTooltip();
                }
                map.setView([lat, lng], 15);
            }
        }
        
        async function connectAsRaton() {
            const quesoId = document.getElementById('quesoId').value.trim().toUpperCase();
            
            if (!quesoId) {
                alert('❌ Ingresa el código del queso');
                return;
            }
            
            if (!quesoId.startsWith('Q-')) {
                alert('❌ El código debe comenzar con Q- (ejemplo: Q-ABC123)');
                return;
            }
            
            if (!stompClient || !stompClient.connected) {
                try {
                    await connectWebSocket();
                } catch (error) {
                    alert('❌ No se pudo conectar al servidor');
                    return;
                }
            }
            
            currentQuesoId = quesoId;
            subscribeToQueso(quesoId);
            
            isConnected = true;
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('disconnectBtn').disabled = false;
            document.getElementById('status').innerHTML = `🐭 Siguiendo al queso ${quesoId}`;
            document.getElementById('status').className = 'status status-connected';
            document.getElementById('coordinates').innerHTML = '🧀 Esperando la primera ubicación del queso...';
        }
        
        function disconnect() {
            if (subscription) {
                subscription.unsubscribe();
                subscription = null;
            }
            
            if (stompClient) {
                stompClient.disconnect();
                stompClient = null;
            }
            
            isConnected = false;
            currentQuesoId = null;
            
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            document.getElementById('status').innerHTML = '⚪ Sin seguir al queso';
            document.getElementById('status').className = 'status status-disconnected';
            document.getElementById('coordinates').innerHTML = 'Esperando ubicación del queso...';
            document.getElementById('lastUpdate').innerHTML = '';
            
            if (marker) {
                marker.remove();
                marker = null;
            }
        }
        
        initMap();
    </script>
</body>
</html>
