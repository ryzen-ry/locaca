<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Emisor - Location Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #667eea; text-align: center; margin-bottom: 30px; }
        .code-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .code-label { color: white; opacity: 0.9; margin-bottom: 10px; font-size: 14px; }
        .code-value {
            font-family: monospace;
            font-size: 32px;
            font-weight: bold;
            color: white;
            letter-spacing: 4px;
            word-break: break-all;
        }
        .btn-generate {
            background: #FF9800;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            font-weight: bold;
        }
        .btn-generate:hover { background: #F57C00; }
        .share-btn {
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            margin-left: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
            font-weight: bold;
        }
        button:hover { transform: translateY(-2px); }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
        }
        .status-active { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-inactive { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .coordinates {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .config-panel {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .config-panel label {
            font-weight: bold;
            margin-right: 10px;
        }
        .config-panel input {
            width: 80px;
            padding: 8px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .info-multi {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            color: #1565C0;
        }
        .code-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 Dispositivo Emisor</h1>
        
        <div class="code-box">
            <div class="code-label">🔑 CÓDIGO ACTUAL (Compártelo con los receptores)</div>
            <div class="code-value" id="emisorCode">---</div>
            <div class="code-buttons">
                <button class="btn-generate" onclick="generateNewCode()">🔄 Generar nuevo código</button>
                <button class="share-btn" onclick="shareCode()">📤 Compartir código</button>
            </div>
        </div>
        
        <div class="info-multi">
            📢 <strong>Múltiples receptores</strong> - Puedes compartir este código con varias personas. ¡Todas te verán al mismo tiempo!
        </div>
        
        <div class="config-panel">
            <label>⏱️ Actualizar cada:</label>
            <input type="number" id="intervalSeconds" min="1" max="60" value="5" />
            <span>segundos</span>
        </div>
        
        <button class="btn-start" onclick="startSharing()" id="startBtn" disabled>🟢 Comenzar a compartir ubicación</button>
        <button class="btn-stop" onclick="stopSharing()" id="stopBtn" disabled>🔴 Detener</button>
        
        <div id="status" class="status status-inactive">⚪ Sin código - Presiona "Generar nuevo código"</div>
        
        <div class="coordinates" id="coordinates">
            📍 Esperando ubicación...
        </div>
        
        <div style="text-align: center;">
            <a href="/" class="back-btn">← Volver al inicio</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    
    <script>
        let stompClient = null;
        let watchId = null;
        let intervalId = null;
        let isSharing = false;
        let emisorId = null;
        let currentPosition = null;
        
        // Generar nuevo código (sin localStorage)
        function generateNewCode() {
            // Generar código completamente nuevo y aleatorio
            const newCode = 'EM-' + Math.random().toString(36).substr(2, 8).toUpperCase();
            emisorId = newCode;
            document.getElementById('emisorCode').innerText = emisorId;
            
            // Si ya estaba compartiendo, detenerlo porque cambió el código
            if (isSharing) {
                stopSharing();
                document.getElementById('status').innerHTML = '⚠️ Código cambiado. Presiona "Comenzar a compartir" para activarlo';
                document.getElementById('status').className = 'status status-warning';
            }
            
            // Habilitar el botón de comenzar
            document.getElementById('startBtn').disabled = false;
            
            console.log('✅ Nuevo código generado:', emisorId);
            return emisorId;
        }
        
        // Compartir código por WhatsApp u otras apps
        function shareCode() {
            if (!emisorId) {
                alert('⚠️ Primero genera un código presionando "Generar nuevo código"');
                return;
            }
            
            const url = window.location.origin + '/receptor.html';
            const text = `📍 Te invito a ver mi ubicación en tiempo real\n\nMi código es: ${emisorId}\n\nIngresa aquí: ${url}`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Location Tracker',
                    text: `Mi código es: ${emisorId}`,
                    url: url
                });
            } else {
                navigator.clipboard.writeText(`${emisorId}`);
                alert(`✅ Código ${emisorId} copiado al portapapeles. Compártelo con tus receptores.`);
            }
        }
        
        function connectWebSocket() {
            return new Promise((resolve, reject) => {
                const socket = new SockJS(`${window.location.origin}/ws-location`);
                stompClient = Stomp.over(socket);
                
                stompClient.connect({}, () => {
                    console.log('✅ Conectado al servidor');
                    resolve();
                }, (error) => {
                    console.error('❌ Error de conexión:', error);
                    reject(error);
                });
            });
        }
        
        // Enviar ubicación al canal público (múltiples receptores)
        function sendLocation() {
            if (!isSharing) return;
            if (!emisorId) return;
            if (!currentPosition) {
                console.log('⏳ Esperando primera ubicación...');
                return;
            }
            
            const location = {
                emisorId: emisorId,
                latitude: currentPosition.latitude,
                longitude: currentPosition.longitude,
                timestamp: Date.now(),
                active: true
            };
            
            if (stompClient && stompClient.connected) {
                // Enviar al canal público para que múltiples receptores lo reciban
                stompClient.send("/app/send-location", {}, JSON.stringify(location));
                document.getElementById('coordinates').innerHTML = `
                    📍 Ubicación enviada (cada ${document.getElementById('intervalSeconds').value} segundos)<br>
                    📡 Código activo: ${emisorId}<br>
                    Lat: ${currentPosition.latitude.toFixed(6)}<br>
                    Lng: ${currentPosition.longitude.toFixed(6)}<br>
                    🕐 Último envío: ${new Date().toLocaleTimeString()}
                `;
                console.log('📍 Ubicación enviada al canal público:', location);
            }
        }
        
        // Actualiza la posición actual cuando el GPS detecta cambio
        function updatePosition(position) {
            currentPosition = {
                latitude: position.coords.latitude,
                longitude: position.coords.longitude
            };
            console.log('📍 Posición actualizada:', currentPosition);
        }
        
        function handleLocationError(error) {
            let message = '';
            switch(error.code) {
                case 1: message = '❌ Permiso denegado. Activa la ubicación en la configuración.'; break;
                case 2: message = '❌ Ubicación no disponible.'; break;
                case 3: message = '⏰ Timeout - Intentando de nuevo...'; break;
            }
            document.getElementById('status').innerHTML = message;
        }
        
        async function startSharing() {
            if (!emisorId) {
                alert('⚠️ Primero genera un código presionando "Generar nuevo código"');
                return;
            }
            
            if (!stompClient || !stompClient.connected) {
                try {
                    await connectWebSocket();
                } catch (error) {
                    alert('No se pudo conectar al servidor');
                    return;
                }
            }
            
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización');
                return;
            }
            
            isSharing = true;
            
            const intervalSeconds = parseInt(document.getElementById('intervalSeconds').value) || 5;
            
            // 1. Escuchar cambios de posición
            watchId = navigator.geolocation.watchPosition(
                updatePosition,
                handleLocationError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
            
            // 2. Enviar ubicación cada N segundos
            intervalId = setInterval(() => {
                sendLocation();
            }, intervalSeconds * 1000);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerHTML = `🟢 Compartiendo ubicación (cada ${intervalSeconds} segundos) - Código: ${emisorId}`;
            document.getElementById('status').className = 'status status-active';
        }
        
        function stopSharing() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            isSharing = false;
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('status').innerHTML = '⚪ Detenido - Ya no compartes ubicación';
            document.getElementById('status').className = 'status status-inactive';
        }
        
        // Inicializar: NO generar código automáticamente
        // El usuario debe presionar "Generar nuevo código"
        connectWebSocket().catch(console.error);
    </script>
</body>
</html>
