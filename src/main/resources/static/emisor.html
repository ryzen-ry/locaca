<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧀 El Queso - Location Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #F9A825 0%, #FF8F00 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #F9A825; text-align: center; margin-bottom: 30px; }
        .code-box {
            background: linear-gradient(135deg, #F9A825 0%, #FF8F00 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .code-label { color: white; opacity: 0.9; margin-bottom: 10px; font-size: 14px; }
        .code-value {
            font-family: monospace;
            font-size: 32px;
            font-weight: bold;
            color: white;
            letter-spacing: 4px;
            word-break: break-all;
        }
        .btn-generate {
            background: #FF9800;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            font-weight: bold;
        }
        .btn-generate:hover { background: #F57C00; }
        .share-btn {
            background: #25D366;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            margin-left: 10px;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
            font-weight: bold;
        }
        button:hover { transform: translateY(-2px); }
        .btn-start { background: #4CAF50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
        }
        .status-active { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-inactive { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .coordinates {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 14px;
            text-align: center;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            color: #F9A825;
            text-decoration: none;
        }
        .config-panel {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }
        .config-panel label {
            font-weight: bold;
            margin-right: 10px;
        }
        .config-panel input {
            width: 80px;
            padding: 8px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .info-multi {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-top: 10px;
            color: #1565C0;
        }
        .code-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧀 El Queso</h1>
        
        <div class="code-box">
            <div class="code-label">🔑 CÓDIGO DEL QUESO (Compártelo con los ratones)</div>
            <div class="code-value" id="emisorCode">---</div>
            <div class="code-buttons">
                <button class="btn-generate" onclick="generateNewCode()">🔄 Generar nuevo código</button>
                <button class="share-btn" onclick="shareCode()">📤 Compartir código</button>
            </div>
        </div>
        
        <div class="info-multi">
            🐭 <strong>Múltiples ratones</strong> - Varios ratones pueden seguir este queso al mismo tiempo
        </div>
        
        <div class="config-panel">
            <label>⏱️ Actualizar cada:</label>
            <input type="number" id="intervalSeconds" min="1" max="60" value="5" />
            <span>segundos</span>
        </div>
        
        <button class="btn-start" onclick="startSharing()" id="startBtn" disabled>🟢 Compartir ubicación (soy el queso)</button>
        <button class="btn-stop" onclick="stopSharing()" id="stopBtn" disabled>🔴 Detener</button>
        
        <div id="status" class="status status-inactive">⚪ Sin código - Presiona "Generar nuevo código"</div>
        
        <div class="coordinates" id="coordinates">
            🧀 Esperando ubicación del queso...
        </div>
        
        <div style="text-align: center;">
            <a href="/" class="back-btn">← Volver al inicio</a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    
    <script>
        let stompClient = null;
        let watchId = null;
        let intervalId = null;
        let isSharing = false;
        let quesoId = null;
        let currentPosition = null;
        
        // Cambio: emisorId ahora es quesoId
        function generateNewCode() {
            const newCode = 'Q-' + Math.random().toString(36).substr(2, 8).toUpperCase();
            quesoId = newCode;
            document.getElementById('emisorCode').innerText = quesoId;
            
            if (isSharing) {
                stopSharing();
                document.getElementById('status').innerHTML = '⚠️ Código cambiado. Presiona "Compartir ubicación" para activarlo';
                document.getElementById('status').className = 'status status-warning';
            }
            
            document.getElementById('startBtn').disabled = false;
            console.log('✅ Nuevo código de queso:', quesoId);
            return quesoId;
        }
        
        function shareCode() {
            if (!quesoId) {
                alert('⚠️ Primero genera un código presionando "Generar nuevo código"');
                return;
            }
            
            const url = window.location.origin + '/raton.html';
            const text = `🧀 ¡El queso está aquí!\n\nCódigo del queso: ${quesoId}\n\nÚnete como ratón: ${url}`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Queso Tracker',
                    text: `Código del queso: ${quesoId}`,
                    url: url
                });
            } else {
                navigator.clipboard.writeText(`${quesoId}`);
                alert(`✅ Código ${quesoId} copiado. ¡Compártelo con los ratones!`);
            }
        }
        
        function connectWebSocket() {
            return new Promise((resolve, reject) => {
                const socket = new SockJS(`${window.location.origin}/ws-location`);
                stompClient = Stomp.over(socket);
                
                stompClient.connect({}, () => {
                    console.log('✅ Queso conectado al servidor');
                    resolve();
                }, (error) => {
                    console.error('❌ Error de conexión:', error);
                    reject(error);
                });
            });
        }
        
        function sendLocation() {
            if (!isSharing) return;
            if (!quesoId) return;
            if (!currentPosition) {
                console.log('⏳ Esperando ubicación del queso...');
                return;
            }
            
            const location = {
                emisorId: quesoId,
                latitude: currentPosition.latitude,
                longitude: currentPosition.longitude,
                timestamp: Date.now(),
                active: true
            };
            
            if (stompClient && stompClient.connected) {
                stompClient.send("/app/send-location", {}, JSON.stringify(location));
                document.getElementById('coordinates').innerHTML = `
                    🧀 Ubicación del queso (cada ${document.getElementById('intervalSeconds').value} segundos)<br>
                    🆔 Código: ${quesoId}<br>
                    📍 Lat: ${currentPosition.latitude.toFixed(6)}<br>
                    📍 Lng: ${currentPosition.longitude.toFixed(6)}<br>
                    🕐 Último envío: ${new Date().toLocaleTimeString()}
                `;
                console.log('🧀 Ubicación del queso enviada:', location);
            }
        }
        
        function updatePosition(position) {
            currentPosition = {
                latitude: position.coords.latitude,
                longitude: position.coords.longitude
            };
            console.log('🧀 Posición del queso actualizada:', currentPosition);
        }
        
        function handleLocationError(error) {
            let message = '';
            switch(error.code) {
                case 1: message = '❌ Permiso denegado. Activa la ubicación para que los ratones te encuentren.'; break;
                case 2: message = '❌ Ubicación no disponible.'; break;
                case 3: message = '⏰ Timeout - Intentando de nuevo...'; break;
            }
            document.getElementById('status').innerHTML = message;
        }
        
        async function startSharing() {
            if (!quesoId) {
                alert('⚠️ Primero genera un código presionando "Generar nuevo código"');
                return;
            }
            
            if (!stompClient || !stompClient.connected) {
                try {
                    await connectWebSocket();
                } catch (error) {
                    alert('No se pudo conectar al servidor');
                    return;
                }
            }
            
            if (!navigator.geolocation) {
                alert('Tu navegador no soporta geolocalización');
                return;
            }
            
            isSharing = true;
            
            const intervalSeconds = parseInt(document.getElementById('intervalSeconds').value) || 5;
            
            watchId = navigator.geolocation.watchPosition(
                updatePosition,
                handleLocationError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 5000
                }
            );
            
            intervalId = setInterval(() => {
                sendLocation();
            }, intervalSeconds * 1000);
            
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('status').innerHTML = `🟢 El queso está siendo compartido (cada ${intervalSeconds}s) - Código: ${quesoId}`;
            document.getElementById('status').className = 'status status-active';
        }
        
        function stopSharing() {
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = null;
            }
            
            isSharing = false;
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('status').innerHTML = '⚪ El queso ya no comparte ubicación';
            document.getElementById('status').className = 'status status-inactive';
        }
        
        connectWebSocket().catch(console.error);
    </script>
</body>
</html>
